name: Publish to npm

# Fires on every annotated tag matching vX.Y.Z.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    # Must match the environment you registered on npm's Trusted Publisher.
    environment:
      name: npm
      url: https://www.npmjs.com/package/@emailalias/react
    # Required for OIDC (Trusted Publisher) + npm provenance attestation.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Publish to npm via Trusted Publisher
        run: npm publish --provenance --access public
        # --access public is required for scoped packages on first publish.
        # No NODE_AUTH_TOKEN — OIDC handles auth.
